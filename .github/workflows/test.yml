name: Run Tests

# PR-only: this suite gates every PR into main. A post-merge run on main is
# redundant (the PR already passed) and only burns CI minutes, so there is no
# push trigger — release.yml owns the merge-to-main path.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Run tests with Maven (parallel execution)
      run: ./mvnw clean test